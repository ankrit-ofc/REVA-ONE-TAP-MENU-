name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: migration + dependency audit ───────────────────────────────────
  backend:
    name: Backend — migration + pip-audit
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_postgres_pass
          POSTGRES_DB: appdb_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps + pip-audit
        working-directory: backend
        run: pip install -r requirements.txt pip-audit

      - name: pip-audit (no known CVEs in direct deps)
        working-directory: backend
        run: pip-audit -r requirements.txt

      - name: Create restricted DB role (mirrors db/init/01_roles.sql)
        env:
          PGPASSWORD: ci_postgres_pass
        run: |
          psql -h localhost -U postgres -d appdb_ci \
            -c "CREATE ROLE tenant_app_user WITH LOGIN PASSWORD 'ci_app_pass' NOSUPERUSER NOCREATEDB NOCREATEROLE;"
          psql -h localhost -U postgres -d appdb_ci \
            -c "GRANT CONNECT ON DATABASE appdb_ci TO tenant_app_user;"
          psql -h localhost -U postgres -d appdb_ci \
            -c "GRANT USAGE, CREATE ON SCHEMA public TO tenant_app_user;"
          psql -h localhost -U postgres -d appdb_ci \
            -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO tenant_app_user;"
          psql -h localhost -U postgres -d appdb_ci \
            -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO tenant_app_user;"

      - name: Alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://tenant_app_user:ci_app_pass@localhost:5432/appdb_ci
          SECRET_KEY: ci-test-secret-key-do-not-use-in-production-x
          QR_SECRET: ci-test-qr-secret-do-not-use-in-production-xx
        run: alembic upgrade head

  # ── Frontend: type-check + lint + build + npm audit ────────────────────────
  frontend:
    name: Frontend — tsc + lint + build + npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps (ci — strict lockfile)
        working-directory: frontend
        run: npm ci

      - name: npm audit (prod deps, fail on high/critical)
        working-directory: frontend
        # --omit=dev: dev-only tooling (vite/esbuild/eslint) has dev-server
        # advisories fixable only by major upgrades; the gate stays strict for
        # everything that ships in the production bundle.
        run: npm audit --omit=dev --audit-level=high

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Production build
        working-directory: frontend
        run: npm run build
