# All environment variables are read from backend/.env.
# Copy backend/.env.example to backend/.env and fill in real values before first run.

services:
  db:
    image: postgres:17
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      # Host 5433 is often reserved by Windows Hyper-V; 15433 is safer for local tools.
      - "15433:5432"
    healthcheck:
      # $$VAR is shell-expanded inside the container (single $ would be consumed by compose).
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    # Dev: auto-reload on code changes (the ./backend bind mount below is watched).
    # The image CMD has no --reload, so the live server would otherwise serve stale code.
    # --proxy-headers + --forwarded-allow-ips: resolve the real client IP from
    # X-Forwarded-For, but ONLY when the direct peer is on the Docker network
    # (Caddy). Keep the CIDR in sync with TRUSTED_PROXY_IPS (app/core/config.py).
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--proxy-headers", "--forwarded-allow-ips", "172.16.0.0/12"]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # GLB → USDZ converter (headless Blender). Shares the backend's media dir so it
  # reads generated .glb files and writes .usdz alongside them (paths, not bytes).
  model-converter:
    build:
      context: ./model-converter
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend/media:/media

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ""
      BACKEND_URL: "http://backend:8000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # HTTPS reverse proxy for PWA testing on real devices (phones/tablets).
  # Desktop can keep using http://localhost:3000; phones must use https://<LAN-IP>
  # because service workers need a secure context. Uses Caddy's local CA — install
  # its root cert on the device to avoid a TLS warning (see docs/PWA.txt).
  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      # Set to your PC's LAN IP for phone testing (defaults to localhost):
      #   PWA_HOST=192.168.1.50 docker compose up -d
      PWA_HOST: ${PWA_HOST:-localhost}
    ports:
      - "443:443"
    volumes:
      # Directory mount (not single-file) so Caddyfile edits are always picked up —
      # a single-file bind pins the inode and goes stale on rename. See caddy/dev/.
      - ./caddy/dev:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  postgres_data:
  frontend_node_modules:
  caddy_data:
  caddy_config:
